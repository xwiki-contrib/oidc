\u0442\u0438 \u0432 \u0440\u043E\u043B\u0456 \u0441\u0442\u043E\u0440\u043E\u043D\u0438 OpenID Connect, \u0449\u043E \u043F\u043E\u043A\u043B\u0430\u0434\u0430\u0454\u0442\u044C\u0441\u044F.
