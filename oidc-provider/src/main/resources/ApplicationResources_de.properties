XWiki.OIDC.Provider.ClientClass_redirectUris=Zulässige Weiterleitungs-URIs
XWiki.OIDC.Provider.ClientClass_redirectUris_hint=Die URIs, zu denen der Anbieter nach der Authentifizierung weiterleitet. Sie können mehrere URIs angeben, indem Sie diese durch Kommas trennen. Beispiel: https://myapp.com/callback, https://myapp.com/redirect.
XWiki.OIDC.Provider.ClientClass_logoutURI=URI zum Abmelden über den Rückkanal (Back-channel)
XWiki.OIDC.Provider.ClientClass_logoutURI_hint=Die URI, die der Anbieter aufruft, um den Client über ein Abmeldeereignis zu informieren, sofern der Client die Abmeldung über den Rückkanal (Back-channel) unterstützt.
oidc.provider.clients.description=Dieses Dokument enthält die Metadaten zu den Anwendungen, die den OpenID Connect-Anbieter zur Authentifizierung nutzen können. Sie können diese mithilfe des Objekteditors bearbeiten. Die Clients verfügen zudem über eine Liste zulässiger Umleitungs-URIs, d. h. der URIs, zu denen der Anbieter nach der Authentifizierung umleitet. Es ist auch möglich, einen Client mit leeren Metadaten einzurichten, damit jede beliebige Anwendung als OpenID Connect-Vertrauenspartei fungieren kann.
oidc.provider.admin.title=Anbieter
oidc.provider.admin.clients.title=Clients
oidc.provider.admin.clients.description=Der Anbieter verfügt über zwei verschiedene Modi: den \u201Edynamischen\u201C Modus und den \u201Estatischen\u201C Modus. Es wird allgemein empfohlen, in Produktionsumgebungen den \u201Estatischen\u201C Modus zu verwenden, da dieser mehr Kontrolle darüber bietet, wem als vertrauende Partei vertraut werden kann.
oidc.provider.admin.clients.mode.dynamic=Dynamischer Modus
oidc.provider.admin.clients.mode.dynamic.hint=In diesem Modus kann jeder Client ohne Registrierung für die OpenID Connect-Authentifizierung verwendet werden.
oidc.provider.admin.clients.mode.dynamic.save=In den dynamischen Modus wechseln
oidc.provider.admin.clients.mode.dynamic.saved=In den dynamischen Modus gewechselt
oidc.provider.admin.clients.mode.static=Statischer Modus
oidc.provider.admin.clients.mode.static.hint=In diesem Modus können nur Clients, die von einem Administrator registriert wurden, für die OpenID Connect-Authentifizierung verwendet werden.
oidc.provider.admin.clients.mode.static.save=In den statischen Modus wechseln
oidc.provider.admin.clients.mode.static.saved=In den statischen Modus gewechselt
